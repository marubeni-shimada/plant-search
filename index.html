<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>プラント検索</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" id="brandMark"></div>
        <div class="brand-title">プラント検索</div>
      </div>
      <a class="admin-link" href="./admin.html" id="adminLink"></a>
    </header>

    <div class="card">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabDistance" data-icon="map">近い順検索</button>
        <button class="mode-tab" id="tabFilter" data-icon="filter">一覧フィルタ</button>
      </div>

      <div id="modeDistance">
        <label class="label">現場住所</label>
        <div class="search-bar">
          <input type="text" id="origin" placeholder="例: 静岡県磐田市見付2989" />
          <button class="btn-primary" id="searchBtn" data-icon="search">距離計算</button>
        </div>
        <div class="status" id="statusDist">
          ※GoogleMapで距離確認推奨(1km範囲の誤差あり)・1日100回まで
        </div>
      </div>

      <div id="modeFilter" style="display:none;">
        <label class="label">会社名・住所で絞り込み</label>
        <input type="text" id="filterText" class="field-input" placeholder="例: 静岡市 / 生コン" />
        <div class="status" id="statusFilter"></div>
      </div>
    </div>

    <div class="card results-wrap">
      <div id="results">
        <div class="results-empty">上で検索条件を入力してください</div>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./icons.js"></script>
  <script src="./api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
